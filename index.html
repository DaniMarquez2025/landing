<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Landing Express FIX</title>
<style>
body { background:#000; color:#fff; font-family:Arial; }
.form-submit {
  background: linear-gradient(90deg,#ff7a00,#ff4d4d);
  border:none;
  padding:15px;
  width:100%;
  color:white;
  font-size:18px;
  cursor:pointer;
}
input, textarea {
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<h2>Formulario</h2>

<form action="https://formsubmit.co/landingexpressforyou@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="Nuevo lead web">

<input type="text" name="nombre" placeholder="Nombre" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="mensaje" placeholder="Describe tu proyecto..." required></textarea>

<button type="submit" class="form-submit">ENVIAR</button>

</form>

<div id="mensaje-ok" style="display:none; margin-top:10px; color:#ff7a00;">
✔ Mensaje enviado · Te respondemos en menos de 24h
</div>

<script>
document.querySelector("form").addEventListener("submit", function(){
  document.querySelector(".form-submit").innerText = "ENVIADO";
  document.getElementById("mensaje-ok").style.display = "block";
});
</script>

</body>
</html>
